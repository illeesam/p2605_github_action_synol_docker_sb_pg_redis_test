version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: board-db
    restart: always
    environment:
      POSTGRES_DB: board_db
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: board-redis
    restart: always
    ports:
      - "6379:6379"

  app:
    image: ${DOCKER_HUB_USERNAME}/board-app:latest
    container_name: board-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db
      - redis
